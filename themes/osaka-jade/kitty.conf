# vim:ft=kitty

## name: Osaka Jade
## author: Charles Kellogg
## license: MIT
## upstream: https://github.com/CharlesKellogg/kitty-themes/blob/master/themes/osaka-jade.conf
## blurb: Based on the Osaka Jade theme for Omarchy (https://github.com/Justikun/omarchy-osaka-jade-theme)


#: The basic colors

foreground                      #C1C497
background                      #111c18
selection_foreground            #C1C497
selection_background            #23372B


#: Cursor colors

cursor                          #D7C995
cursor_text_color               #000000
cursor_trail_color              none


#: URL underline color when hovering with mouse

url_color                       #ACD4CF


#: kitty window border colors and terminal bell colors

active_border_color             #509475
inactive_border_color           #23372B
bell_border_color               #FF5345
visual_bell_color               none


#: OS Window titlebar colors

wayland_titlebar_color          system
macos_titlebar_color            system


#: Tab bar colors

active_tab_foreground           #111c18
active_tab_background           #509475
inactive_tab_foreground         #53685B
inactive_tab_background         #23372B
tab_bar_background              none
tab_bar_margin_color            none


#: The basic 16 colors

#: black
color0 #23372B
color8 #53685B

#: red
color1 #FF5345
color9 #db9f9c

#: green
color2  #549e6a
color10 #143614

#: yellow
color3  #459451
color11 #E5C736

#: blue
color4  #509475
color12 #ACD4CF

#: magenta
color5  #D2689C
color13 #75bbb3

#: cyan
color6  #2DD5B7
color14 #8CD3CB

#: white
color7  #F6F5DD
color15 #9eebb3

# opacidade e desfoque do terminal
background_opacity 1.0
background_blur 1

# avançado
term xterm-kitty

# sinal sonoro do terminal
enable_audio_bell no

# ajustes específicos do sistema operacional (decoração da janela Gnome para wayland)
linux_display_server x11

# fonte
font_family        JetBrainsMono Nerd Font
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size 12.0

# gerenciamento do tamanho da fonte
map ctrl+shift+backspace change_font_size all 0

# personalização do cursor
# bloco / feixe / sublinhado
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0
shell_integration no-cursor

# histórico de rolagem
scrollback_lines 5000
wheel_scroll_multiplier 3.0

# mouse
mouse_hide_wait -1

# layout da janela
remember_window_size  no
initial_window_width  1200
initial_window_height 750
window_border_width 1.5pt
enabled_layouts tall
window_padding_width 0
window_margin_width 2
hide_window_decorations no

# gerenciamento de janelas
map ctrl+shift+enter new_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# gerenciamento de layout
map ctrl+shift+l next_layout
map ctrl+alt+r goto_layout tall
map ctrl+alt+s goto_layout stack

# personalização da barra de guias
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
tab_bar_align left
active_tab_font_style   bold
inactive_tab_font_style normal

# gerenciamento de guias
map ctrl+shift+t new_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+w close_tab
